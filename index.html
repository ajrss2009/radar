<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Radar Escolar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #f0e8ff 0%, #fff 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, sans-serif;
    }
    .card {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .logo {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: linear-gradient(135deg, #a06cff, #5e2ddb);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 40px rgba(94,45,219,.25);
    }
    .logo img { width: 80px; height: 80px; }
    h1 {
      font-size: 1.7rem;
      font-weight: 900;
      color: #28194f;
    }
    p {
      font-size: 0.85rem;
      color: #6d6489;
      margin-top: -8px;
    }
    .bar {
      width: 160px;
      height: 6px;
      border-radius: 999px;
      background: rgba(94,45,219,.1);
      overflow: hidden;
    }
    .bar span {
      display: block;
      width: 40%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #a06cff, #5e2ddb);
      animation: slide 1.3s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-130%) }
      100% { transform: translateX(320%) }
    }
  </style>
</head>
